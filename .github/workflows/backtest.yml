name: Backtest Bot

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ccxt pandas numpy matplotlib

      - name: Fetch historical data (with synthetic fallback)
        run: python project_scripts/fetch_historical_data.py

      - name: Extract test windows
        run: python project_scripts/extract_test_windows.py

      - name: Run window backtests
        run: python project_scripts/run_window_tests.py

      - name: Run full backtests
        run: python project_scripts/run_full_backtests.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: results/
          if-no-files-found: warn

